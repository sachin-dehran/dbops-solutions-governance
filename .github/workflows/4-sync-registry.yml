name: 4 — Sync Registry & Deploy Dashboard

on:
  repository_dispatch:
    types: [registry-update]
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update registry.json from dispatch payload
        if: github.event_name == 'repository_dispatch'
        run: |
          python3 - << 'PYEOF'
          import json, os, datetime

          payload = json.loads(os.environ.get('EVENT_PAYLOAD', '{}'))
          solution = payload.get('solution', '')
          branch   = payload.get('branch', '')
          raw_cfg  = payload.get('config_json', '{}')

          try:
            incoming = json.loads(raw_cfg) if raw_cfg else {}
          except:
            incoming = {}

          with open('registry.json') as f:
            registry = json.load(f)

          if solution not in registry:
            registry[solution] = {'teams': {}}

          if branch == 'main':
            registry[solution]['master_version'] = incoming.get('current_version', registry[solution].get('master_version'))
            registry[solution]['released_date']  = incoming.get('released_date', '')
            registry[solution]['released_by']    = incoming.get('released_by', '')
          else:
            team = branch.replace('project-', '')
            registry[solution]['teams'][team] = {
              'branch': branch,
              'local_version': incoming.get('local_version', ''),
              'based_on_master': incoming.get('based_on_master', ''),
              'deviation': incoming.get('deviation', False),
              'deviation_reason': incoming.get('deviation_reason', ''),
              'wants_merge': incoming.get('wants_merge_to_master', False),
              'last_updated': incoming.get('last_updated', datetime.datetime.utcnow().isoformat())
            }

          with open('registry.json', 'w') as f:
            json.dump(registry, f, indent=2)
          print(f"Registry updated: {solution}/{branch}")
          PYEOF
        env:
          EVENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}

      - name: Inject registry into index.html + copy to docs/
        run: |
          python3 - << 'PYEOF'
          import json
          from datetime import datetime

          # Read latest registry
          with open('registry.json') as f:
            registry_raw = f.read()
            registry = json.loads(registry_raw)

          # Read index.html
          with open('docs/index.html') as f:
            html = f.read()

          # Replace the embedded registry block
          import re
          new_block = f'<script>\n// AUTO-INJECTED BY GITHUB ACTIONS — DO NOT EDIT MANUALLY\n// Last updated: {datetime.utcnow().isoformat()}\nwindow.EMBEDDED_REGISTRY = {registry_raw.strip()};\n</script>'

          # Remove old injection if exists
          html = re.sub(
            r'<script>\s*// AUTO-INJECTED BY GITHUB ACTIONS.*?</script>\s*',
            '',
            html,
            flags=re.DOTALL
          )

          # Inject before </body>
          html = html.replace('</body>', new_block + '\n</body>')

          # Also copy registry.json to docs/
          with open('docs/registry.json', 'w') as f:
            f.write(registry_raw)

          with open('docs/index.html', 'w') as f:
            f.write(html)

          print(f"Injected registry ({len(registry)} solutions) into index.html")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add registry.json docs/registry.json docs/index.html
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "sync: registry updated + dashboard rebuilt $(date +%Y-%m-%dT%H:%M)"
          git push
          echo "Done"
