<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DBOps Solutions Governance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#05080f;--s1:#0c1525;--s2:#101d30;--s3:#162038;--master:#00e5a0;--blue:#4d9fff;--purple:#8b5cf6;--amber:#f59e0b;--red:#ef4444;--text:#ddeeff;--muted:#3d5a7a;--border:rgba(77,159,255,0.1);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
.tb{position:sticky;top:0;z-index:200;background:rgba(5,8,15,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;}
.tb-brand{display:flex;align-items:center;gap:12px;}
.tb-logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#00e5a0,#0055ff);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#000;}
.tb-name{font-size:15px;font-weight:700;color:#fff;}
.tb-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:1px;}
.tb-nav{display:flex;gap:2px;}
.nb{padding:7px 16px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.nb:hover{color:var(--text);background:rgba(255,255,255,0.05);}
.nb.on{color:var(--master);background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);}
.nb.prov{color:#a78bfa;}
.nb.prov.on{color:#a78bfa;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.3);}
.tb-right{display:flex;gap:8px;align-items:center;}
.live-badge{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--master);background:rgba(0,229,160,0.07);border:1px solid rgba(0,229,160,0.18);padding:4px 12px;border-radius:20px;}
.live-dot{width:6px;height:6px;background:var(--master);border-radius:50%;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
.gh-btn{font-size:12px;font-weight:600;color:#fff;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);padding:6px 14px;border-radius:7px;text-decoration:none;}
.alert-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);padding:4px 10px;border-radius:5px;}
.pg{padding:28px 32px;max-width:1440px;margin:0 auto;}
.page{display:none;}
.page.on{display:block;}
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:22px;}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:visible;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0;}
.k1::before{background:linear-gradient(90deg,var(--master),transparent);}
.k2::before{background:linear-gradient(90deg,var(--blue),transparent);}
.k3::before{background:linear-gradient(90deg,var(--purple),transparent);}
.k4::before{background:linear-gradient(90deg,var(--amber),transparent);}
.k5::before{background:linear-gradient(90deg,#64748b,transparent);}
.k6::before{background:linear-gradient(90deg,var(--red),transparent);}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start;}
.kv{font-size:30px;font-weight:800;line-height:1;color:#fff;}
.kl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:6px;text-transform:uppercase;}
.ks{font-size:10px;color:var(--muted);margin-top:2px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:13px;padding:20px 22px;margin-bottom:14px;overflow:visible;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-head-left{display:flex;align-items:center;gap:8px;}
.card-title{font-size:14px;font-weight:700;color:#fff;}
.card-badge{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.05);color:var(--muted);}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
.info-btn{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#64748b;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-family:'DM Mono',monospace;flex-shrink:0;}
.info-btn:hover{background:rgba(0,229,160,0.12);border-color:rgba(0,229,160,0.3);color:var(--master);}
.info-popup{position:fixed;width:290px;background:#0f1e35;border:1px solid rgba(0,229,160,0.25);border-radius:12px;padding:16px;z-index:99999;box-shadow:0 16px 48px rgba(0,0,0,0.8);}
.ip-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.07);}
.ip-row{margin-bottom:8px;}
.ip-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--master);text-transform:uppercase;margin-bottom:3px;}
.ip-txt{font-size:11px;color:#7a9bbf;line-height:1.6;}
.ip-close{float:right;background:none;border:none;color:#64748b;cursor:pointer;font-size:14px;margin:-4px -4px 0 0;}
.matrix-wrap{overflow-x:auto;}
.mtbl{width:100%;border-collapse:collapse;}
.mtbl th{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding:8px 10px;text-align:center;border-bottom:1px solid var(--border);}
.mtbl th:first-child{text-align:left;}
.mtbl td{padding:5px 10px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.03);}
.mtbl td:first-child{text-align:left;font-weight:700;font-size:13px;}
.cell{display:inline-flex;flex-direction:column;align-items:center;min-width:120px;padding:5px 8px;border-radius:7px;font-family:'DM Mono',monospace;font-size:9px;border:1px solid transparent;cursor:pointer;line-height:1.4;}
.cell.master{background:rgba(0,229,160,.1);color:var(--master);border-color:rgba(0,229,160,.2);}
.cell.deviated{background:rgba(245,158,11,.1);color:var(--amber);border-color:rgba(245,158,11,.2);}
.cell.behind{background:rgba(77,159,255,.1);color:var(--blue);border-color:rgba(77,159,255,.2);}
.cell.wants-merge{background:rgba(139,92,246,.1);color:#a78bfa;border-color:rgba(139,92,246,.25);}
.cell.na{background:rgba(255,255,255,.03);color:#1e3a5f;border-color:rgba(255,255,255,.04);}
.cell-ver{font-size:10px;font-weight:700;}
.cell-status{font-size:8px;opacity:0.8;margin-top:1px;}
.leg-row{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.ld{width:10px;height:10px;border-radius:3px;}
.drift-item{background:var(--s2);border-radius:9px;padding:12px 14px;border-left:3px solid var(--red);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px;}
.drift-item.warn{border-color:var(--amber);}
.drift-item.merge{border-color:var(--purple);}
.di-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.dtag{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;}
.dtag.sol{background:rgba(139,92,246,.1);color:#a78bfa;}
.dtag.team{background:rgba(0,229,160,.1);color:var(--master);}
.dtag.ver{background:rgba(255,255,255,.06);color:var(--muted);}
.di-msg{font-size:12px;color:var(--text);}
.stag{font-family:'DM Mono',monospace;font-size:9px;padding:3px 9px;border-radius:5px;white-space:nowrap;}
.stag.warn{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2);}
.stag.merge{background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.2);}
.mc-tbl{width:100%;border-collapse:collapse;}
.mc-tbl th{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
.mc-tbl td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03);font-size:12px;}
.mc-tbl tr:hover td{background:rgba(255,255,255,.02);}
.mv{font-family:'DM Mono',monospace;font-size:11px;}
.mv.ok{color:var(--master);}
.mv.old{color:var(--amber);}
.gh-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);text-decoration:none;}
.hring{display:flex;align-items:center;gap:22px;}
.ring-wrap{position:relative;width:120px;height:120px;flex-shrink:0;}
.ring-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;}
.ring-val span{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.hbars{flex:1;display:flex;flex-direction:column;gap:8px;}
.hbar-row{display:flex;align-items:center;gap:8px;}
.hbar-label{font-size:11px;color:#94a3b8;min-width:110px;}
.hbar-track{flex:1;height:7px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:3px;}
.hbar-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-width:30px;text-align:right;}
.trend-bars{display:flex;align-items:flex-end;gap:28px;height:120px;padding-bottom:4px;}
.tg{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;}
.tbw{display:flex;gap:4px;align-items:flex-end;height:88px;}
.tbar{width:24px;border-radius:4px 4px 0 0;position:relative;}
.tbar:hover .ttip{display:block;}
.ttip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:4px 8px;font-size:10px;font-family:'DM Mono',monospace;white-space:nowrap;display:none;z-index:10;}
.tq{font-family:'DM Mono',monospace;font-size:10px;color:#334155;}
.th-val{font-size:13px;font-weight:700;color:#fff;}
.qgrid{display:grid;gap:10px;}
.qstep{background:var(--s2);border-radius:9px;padding:14px;border-top:2px solid transparent;}
.qstep.w1{border-color:var(--master);}
.qstep.w2{border-color:var(--blue);}
.qstep.w3{border-color:var(--amber);}
.qstep.w4{border-color:var(--purple);}
.qw{font-family:'DM Mono',monospace;font-size:9px;color:var(--master);margin-bottom:5px;}
.qt{font-size:12px;font-weight:700;color:#fff;margin-bottom:5px;}
.qd{font-size:11px;color:var(--muted);line-height:1.6;}
.rules-banner{background:var(--s2);border:1px solid rgba(239,68,68,.15);border-radius:11px;padding:16px 20px;margin-bottom:16px;}
.rb-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.rb-title{font-size:13px;font-weight:700;color:#f87171;}
.rules-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.rule{display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0;}
.rule.ok{color:#94a3b8;}
.rule.no{color:#f87171;}
.sol-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.stab{font-family:'DM Mono',monospace;font-size:10px;padding:4px 11px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;}
.stab.on{color:var(--master);background:rgba(0,229,160,.07);border-color:rgba(0,229,160,.2);}
.cl-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.cl-row:last-child{border:none;}
.clt{font-family:'DM Mono',monospace;font-size:9px;padding:3px 7px;border-radius:4px;min-width:52px;text-align:center;font-weight:600;}
.clt.minor{background:rgba(0,229,160,.1);color:var(--master);}
.clt.patch{background:rgba(77,159,255,.1);color:var(--blue);}
.clt.major{background:rgba(239,68,68,.12);color:#f87171;}
.clv{font-family:'DM Mono',monospace;font-size:11px;color:#94a3b8;min-width:80px;}
.cur-tag{background:rgba(0,229,160,.1);color:var(--master);font-size:9px;padding:1px 5px;border-radius:3px;margin-left:5px;}
.cln{font-size:12px;color:var(--text);flex:1;}
.cld{font-family:'DM Mono',monospace;font-size:10px;color:#334155;white-space:nowrap;}
.wf-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.wf-card{background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:16px;border-left:3px solid var(--blue);}
.wf-card.green{border-left-color:var(--master);}
.wf-card.amber{border-left-color:var(--amber);}
.wf-card.purple{border-left-color:var(--purple);}
.wf-num{font-family:'DM Mono',monospace;font-size:9px;color:var(--blue);margin-bottom:5px;}
.wf-card.green .wf-num{color:var(--master);}
.wf-card.amber .wf-num{color:var(--amber);}
.wf-card.purple .wf-num{color:var(--purple);}
.wf-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:6px;}
.wf-trigger{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);background:rgba(255,255,255,.04);padding:3px 8px;border-radius:4px;margin-bottom:8px;display:inline-block;}
.wf-step{font-size:11px;color:#7a9bbf;display:flex;gap:6px;margin-bottom:4px;}
.wf-step::before{content:'>';color:var(--master);}
.last-upd{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-align:right;margin-bottom:16px;}
.prov-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fg label{font-size:12px;font-weight:600;color:#94a3b8;}
.req{color:var(--red);font-size:10px;}
.fg input,.fg select,.fg textarea{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;width:100%;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(139,92,246,.4);}
.fg input::placeholder,.fg textarea::placeholder{color:var(--muted);}
.fg select option{background:var(--s2);}
.fg textarea{resize:vertical;min-height:70px;}
.hint{font-size:10px;color:var(--muted);margin-top:2px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.team-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:4px;}
.tc{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center;cursor:pointer;transition:all .2s;}
.tc:hover{border-color:rgba(139,92,246,.3);}
.tc.sel{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.35);}
.tc-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;}
.tc-status{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}
.tc.sel .tc-name{color:#a78bfa;}
.submit-btn{padding:13px 28px;border-radius:10px;border:none;background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;}
.prov-msg{border-radius:11px;padding:14px 18px;margin-bottom:12px;font-size:12px;line-height:1.7;display:none;}
.prov-msg.pending{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.2);color:#a78bfa;}
.prov-msg.error{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:#f87171;}
.req-table{width:100%;border-collapse:collapse;}
.req-table th{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
.req-table td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03);font-size:12px;}
.req-table tr:hover td{background:rgba(255,255,255,.02);}
.rs{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;}
.rs-pending{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2);}
.rs-approved{background:rgba(0,229,160,.1);color:var(--master);border:1px solid rgba(0,229,160,.2);}
.appr-btn{font-family:'DM Mono',monospace;font-size:9px;padding:4px 10px;border-radius:5px;background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.2);color:var(--master);cursor:pointer;}
</style>
</head>
<body>
<div class="tb">
  <div class="tb-brand">
    <div class="tb-logo">D</div>
    <div>
      <div class="tb-name">DBOps Solutions Governance</div>
      <div class="tb-sub">sachin-dehran &middot; GitHub-Native &middot; Auto-Versioned</div>
    </div>
  </div>
  <div class="tb-nav">
    <button class="nb on" onclick="showPage('overview',this)">Overview</button>
    <button class="nb" onclick="showPage('matrix',this)">Adoption Matrix</button>
    <button class="nb" onclick="showPage('master',this)">Master Compare</button>
    <button class="nb" onclick="showPage('changelog',this)">Changelog</button>
    <button class="nb" onclick="showPage('workflows',this)">Workflows</button>
    <button class="nb prov" onclick="showPage('provisioning',this)">&#9889; New Solution</button>
  </div>
  <div class="tb-right">
    <div id="alert-badge" class="alert-badge" style="display:none"></div>
    <div class="live-badge"><div class="live-dot"></div>Live</div>
    <a class="gh-btn" href="https://github.com/sachin-dehran/dbops-solutions-governance" target="_blank">GitHub</a>
  </div>
</div>
<div class="pg">
  <div class="last-upd" id="last-upd">Loading...</div>
  <div class="kpi-row" id="kpi-row"></div>
  <div id="page-overview"  class="page on"></div>
  <div id="page-matrix"    class="page"></div>
  <div id="page-master"    class="page"></div>
  <div id="page-changelog" class="page"></div>
  <div id="page-workflows" class="page"></div>
  <div id="page-provisioning" class="page"></div>
</div>

<script>
// ── ALL LOGIC (no template literals, no fetch, pure ES5-safe) ─────────────────

};

var QUARTERS = [
  { n:'Q4 2025', h:62, m:10, d:3, b:3 },
  { n:'Q1 2026', h:74, m:13, d:3, b:1 },

];

];

var INFO = {
  kpi_m:  'ON MASTER — Teams running the exact official Master version. Higher is better.',
  kpi_d:  'DEVIATED LOCAL — Teams with custom changes on their branch. No approval needed. Fine as long as tracked.',

  kpi_b:  'BEHIND MASTER — Teams on an older Master version. Missing bug fixes or new features. Should sync.',

function getStatus(masterVer, t) {
  if (!t) return 'na';
  if (t.wants_merge) return 'wants-merge';
  if (t.based_on_master !== masterVer) return 'behind';
  if (t.deviation) return 'deviated';
  return 'master';
}

function stLabel(st) {
  return { master:'On Master', deviated:'Deviated', behind:'Behind', 'wants-merge':'Wants Merge', na:'Not Adopted' }[st] || st;
}

function computeStats() {
  var om=0,dv=0,wm=0,bh=0,tot=0,sols=0;
  Object.keys(registry).forEach(function(sol) {
    sols++;
    var sd = registry[sol];
    Object.keys(sd.teams||{}).forEach(function(team) {
      var td = sd.teams[team];
      if (!td) return;
      tot++;
      var st = getStatus(sd.master_version, td);
      if (st==='master') om++;
      else if (st==='deviated') dv++;
      else if (st==='wants-merge') wm++;
      else if (st==='behind') bh++;
    });
  });
  return { om:om, dv:dv, wm:wm, bh:bh, tot:tot, sols:sols, h: tot ? Math.round((om/tot)*100) : 0 };
}

function ib(key) {
  return '<span class="info-btn" onclick="showInfo(event,\''+key+'\')">?</span>';
}

function showInfo(e, key) {
  e.stopPropagation();
  var old = document.getElementById('ipop');
  if (old) { old.remove(); return; }
  var msg = INFO[key] || '';
  var btn = e.currentTarget;
  var r = btn.getBoundingClientRect();
  var d = document.createElement('div');
  d.id = 'ipop';
  d.className = 'info-popup';
  d.style.top = (r.bottom + 8) + 'px';
  d.style.left = Math.max(8, r.right - 290) + 'px';
  d.innerHTML = '<button class="ip-close" onclick="document.getElementById(\'ipop\').remove()">x</button>' +
    '<div class="ip-title">Info</div>' +
    '<div class="ip-txt">' + msg + '</div>';
  document.body.appendChild(d);
}
document.addEventListener('click', function() {

});
