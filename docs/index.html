function calculateCompliance(registry, repoKey) {
  var repoData = registry[repoKey];
  if (!repoData || !repoData.teams) {
    return 0;
  }
  var masterVersion = repoData.master_version;
  var teams = repoData.teams;
  var teamKeys = Object.keys(teams);
  // Only count customer-* branches for compliance
  var customerBranches = [];
  for (var i = 0; i < teamKeys.length; i++) {
    var team = teams[teamKeys[i]];
    if (team.branch && team.branch.indexOf('customer-') === 0) {
      customerBranches.push(team);
    }
  }
  // If no customer branches, fall back to all team branches
  if (customerBranches.length === 0) {
    customerBranches = teamKeys.map(function(k) { return teams[k]; });
  }
  if (customerBranches.length === 0) {
    return 0;
  }
  var onMaster = 0;
  for (var j = 0; j < customerBranches.length; j++) {
    if (customerBranches[j].based_on_master === masterVersion) {
      onMaster++;
    }
  }
  return Math.round((onMaster / customerBranches.length) * 100);
}

function renderRepoCards(registry, repoMeta) {
  var repoKeys = Object.keys(registry);
  if (repoKeys.length === 0) {
    return '<p style="color:var(--muted);font-size:13px;">No repositories found in registry.</p>';
  }
  var settings = window._appSettings || getSettings();

  // Search/filter input
  var html = '<div style="margin-bottom:14px;display:flex;gap:10px;align-items:center;">';
  html += '<input type="text" id="repo-search" placeholder="Search repositories..." oninput="filterRepoTable()" style="background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--fg);font-family:DM Sans,sans-serif;width:260px;outline:none;"/>';
  html += '<span style="font-size:11px;color:var(--muted);">' + repoKeys.length + ' repositories</span>';
  html += '</div>';

  html += '<table class="data-table" id="repo-inventory-table"><thead><tr>';
  html += '<th>S.No</th>';
  html += '<th>Repository</th>';
  html += '<th>Branches</th>';
  html += '<th>Latest Release</th>';
  html += '<th>Actions</th>';
  html += '<th>AI Purpose</th>';
  html += '</tr></thead><tbody>';
  for (var i = 0; i < repoKeys.length; i++) {
    var key = repoKeys[i];
    var meta = repoMeta[key] || {};

    var branchCount = meta.branches ? meta.branches.length : null;
    var latestRelease = meta.release && meta.release.tag_name ? meta.release.tag_name : null;
    // Fallback to registry master_version if no GitHub release found
    if (!latestRelease && registry[key] && registry[key].master_version) {
      latestRelease = registry[key].master_version;
    }
    var releaseName = meta.release && meta.release.name ? meta.release.name : null;
    // Also use released_date from registry if available
    var releaseDisplay = latestRelease;
    if (releaseName && releaseName !== latestRelease) {
      releaseDisplay = latestRelease + ' (' + releaseName + ')';
    } else if (latestRelease && registry[key] && registry[key].released_date) {
      releaseDisplay = latestRelease + ' (' + registry[key].released_date + ')';
    }
    var actionsStatus = null;
    if (meta.actionsRun && meta.actionsRun.workflow_runs && meta.actionsRun.workflow_runs.length > 0) {
      actionsStatus = meta.actionsRun.workflow_runs[0].conclusion || meta.actionsRun.workflow_runs[0].status;
    }
    var aiPurpose = window._repoPurposes && window._repoPurposes[key] ? window._repoPurposes[key] : null;

    // Trigger async AI purpose detection — will update the cell when done
    if (!aiPurpose) {
      _triggerPurposeDetection(key, meta);
    }

    var actionsColor = actionsStatus === 'success' ? 'var(--master)' : actionsStatus === 'failure' ? 'var(--red)' : 'var(--fg)';
    var repoUrl = 'https://github.com/' + (settings.github.org || 'sachin-dehran') + '/' + key;

    html += '<tr>';
    html += '<td style="font-family:DM Mono,monospace;color:var(--muted);font-size:11px;">' + (i + 1) + '</td>';
    html += '<td style="font-weight:700;"><a href="' + repoUrl + '" target="_blank" style="color:#fff;text-decoration:none;border-bottom:1px dashed var(--muted);">' + key + '</a></td>';
    html += '<td style="font-family:DM Mono,monospace;">' + (branchCount !== null ? '<a href="#" onclick="showBranchPopup(\'' + key + '\');return false;" style="color:var(--blue);text-decoration:none;border-bottom:1px dashed var(--blue);cursor:pointer;">' + branchCount + '</a>' : '\u2014') + '</td>';
    html += '<td style="font-family:DM Mono,monospace;">' + (releaseDisplay !== null ? releaseDisplay : '\u2014') + '</td>';
    html += '<td style="font-family:DM Mono,monospace;color:' + actionsColor + ';">' + (actionsStatus !== null ? actionsStatus : '\u2014') + '</td>';
    html += '<td style="font-size:11px;max-width:250px;" id="ai-purpose-' + key + '">' + (aiPurpose !== null ? aiPurpose : '<span style="color:var(--muted);">Detecting...</span>') + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

function _triggerPurposeDetection(repoKey, meta) {
  var readmeContent = '';
  if (meta && meta.readme) {
    try { readmeContent = atob((meta.readme.content || '').replace(/\n/g, '')); } catch(e) { readmeContent = ''; }
  }
  detectRepoPurpose(repoKey, readmeContent).then(function(purpose) {
    if (!window._repoPurposes) { window._repoPurposes = {}; }
    window._repoPurposes[repoKey] = purpose;
    // Update the cell directly in the DOM
    var cell = document.getElementById('ai-purpose-' + repoKey);
    if (cell) {
      cell.textContent = purpose;
      cell.style.color = 'var(--fg)';
    }
  });
}

function showBranchPopup(repoKey) {
  var registry = window._registryData || {};
  var repoMeta = window._repoMetaData || {};
  var meta = repoMeta[repoKey] || {};
  var repoData = registry[repoKey] || {};
  var masterVersion = repoData.master_version || '\u2014';
  var teams = repoData.teams || {};

  var branches = meta.branches || [];

  // Build popup content
  var html = '<div class="modal-overlay" id="branch-popup-overlay" onclick="closeBranchPopup(event)" style="display:flex;">';
  html += '<div class="modal-content" onclick="event.stopPropagation()" style="max-width:600px;">';
  html += '<div class="modal-header">';
  html += '<span style="font-size:15px;font-weight:700;color:#fff;">Branches \u2014 ' + repoKey + '</span>';
  html += '<button class="chatbot-close" onclick="closeBranchPopup()">&times;</button>';
  html += '</div>';
  html += '<p style="font-size:11px;color:var(--muted);margin-bottom:12px;">Master version: <span style="color:var(--master);font-weight:600;">' + masterVersion + '</span></p>';
  html += '<table class="data-table"><thead><tr>';
  html += '<th>Branch Name</th>';
  html += '<th>Version</th>';
  html += '<th>Status</th>';
  html += '</tr></thead><tbody>';

  for (var i = 0; i < branches.length; i++) {
    var branchName = typeof branches[i] === 'string' ? branches[i] : (branches[i].name || '');

    // Look up version from registry teams
    var version = '\u2014';
    var statusText = '';
    var statusColor = 'var(--muted)';

    if (branchName === 'main' || branchName === 'master') {
      version = masterVersion;
      statusText = '\u2713 Main Branch';
      statusColor = 'var(--master)';
    } else {
      // Find in teams
      var teamKeys = Object.keys(teams);
      var found = false;
      for (var t = 0; t < teamKeys.length; t++) {
        var team = teams[teamKeys[t]];
        if (team.branch === branchName) {
          version = team.local_version || '\u2014';
          if (team.based_on_master === masterVersion) {
            statusText = '\u2713 Same as Main';
            statusColor = 'var(--master)';
          } else {
            statusText = '\u2717 Different (' + (team.based_on_master || '?') + ')';
            statusColor = 'var(--amber)';
          }
          found = true;
          break;
        }
      }
      if (!found) {
        statusText = '\u2014 Unknown';
        statusColor = 'var(--muted)';
      }
    }

    html += '<tr>';
    html += '<td style="font-family:DM Mono,monospace;font-size:11px;">' + branchName + '</td>';
    html += '<td style="font-family:DM Mono,monospace;font-size:11px;">' + version + '</td>';
    html += '<td style="font-size:11px;color:' + statusColor + ';font-weight:600;">' + statusText + '</td>';
    html += '</tr>';
  }

  html += '</tbody></table>';

  // Add AI Diff button for branches behind master
  var nonMainBranches = [];
  for (var d = 0; d < branches.length; d++) {
    var dName = typeof branches[d] === 'string' ? branches[d] : (branches[d].name || '');
    if (dName !== 'main' && dName !== 'master') {
      nonMainBranches.push(branches[d]);
    }
  }
  if (nonMainBranches.length > 0) {
    html += renderCodeDiffPanel(repoKey, branches);
  }

  html += '</div></div>';

  // Append to body
  document.body.insertAdjacentHTML('beforeend', html);
}

function showInfoPopup(event, key) {
  event.stopPropagation();
  // Remove any existing popup
  var existing = document.querySelector('.info-popup');
  if (existing) {
    existing.parentNode.removeChild(existing);
  }

  var btn = event.currentTarget || event.target;
  var rect = btn.getBoundingClientRect();

  var title = key.charAt(0).toUpperCase() + key.slice(1);
  var text = INFO_POPUP_TEXTS[key] || 'No description available.';

  var popup = document.createElement('div');
  popup.className = 'info-popup';
  popup.innerHTML = '<button class="info-popup-close" onclick="closeInfoPopup()">\u00d7</button>'
    + '<div class="info-popup-title">' + title + '</div>'
    + '<div class="info-popup-text">' + text + '</div>';

  // Position near the button

  var left = rect.left - 120;

  if (top + 120 > window.innerHeight) { top = rect.top - 120; }

  popup.style.top = top + 'px';
  popup.style.left = left + 'px';

  // Close on outside click
  setTimeout(function() {
    document.addEventListener('click', _closeInfoPopupOnOutside);
  }, 0);
}

function _detectSolutionsForCustomer(customer) {
  // Auto-detect which solutions have branches containing this customer's name
  var detected = [];
  if (!customer || !customer.name || !window._repoMetaData) {
    return Array.isArray(customer.solutions) ? customer.solutions : [];
  }
  var custNameLower = customer.name.toLowerCase().replace(/[^a-z0-9]/g, '');
  var repoKeys = Object.keys(window._repoMetaData);
  for (var r = 0; r < repoKeys.length; r++) {
    var meta = window._repoMetaData[repoKeys[r]];
    if (meta && meta.branches) {
      for (var b = 0; b < meta.branches.length; b++) {
        var branchName = typeof meta.branches[b] === 'string' ? meta.branches[b] : (meta.branches[b].name || '');
        if (branchName.indexOf('customer-') === 0) {
          var branchCustPart = branchName.slice(9).toLowerCase().replace(/[^a-z0-9]/g, '');
          if (branchCustPart.indexOf(custNameLower) === 0 || custNameLower.indexOf(branchCustPart) === 0) {
            if (detected.indexOf(repoKeys[r]) === -1) {
              detected.push(repoKeys[r]);
            }
          }
        }
      }
    }
  }
  // Merge with manually assigned solutions
  var manual = Array.isArray(customer.solutions) ? customer.solutions : [];
  for (var m = 0; m < manual.length; m++) {
    if (detected.indexOf(manual[m]) === -1) {
      detected.push(manual[m]);
    }
  }
  return detected;
}

function validateCustomerForm() {
  var name = (document.getElementById('cust-name').value || '').trim();
  var checkboxes = document.querySelectorAll('.cust-solution-cb');
  var selectedSolutions = [];
  for (var i = 0; i < checkboxes.length; i++) {
    if (checkboxes[i].checked) {
      selectedSolutions.push(checkboxes[i].value);
    }
  }

  var errorEl = document.getElementById('customer-form-error');
  if (!name) {
    errorEl.textContent = 'Customer name is required.';
    errorEl.style.display = 'block';
    return null;
  }

  // Auto-detect solutions from branches containing customer name
  if (selectedSolutions.length === 0 && window._repoMetaData) {
    var custNameLower = name.toLowerCase().replace(/[^a-z0-9]/g, '');
    var repoKeys = Object.keys(window._repoMetaData);
    for (var r = 0; r < repoKeys.length; r++) {
      var meta = window._repoMetaData[repoKeys[r]];
      if (meta && meta.branches) {
        for (var b = 0; b < meta.branches.length; b++) {
          var branchName = typeof meta.branches[b] === 'string' ? meta.branches[b] : (meta.branches[b].name || '');
          if (branchName.indexOf('customer-') === 0) {
            var branchCustPart = branchName.slice(9).toLowerCase().replace(/[^a-z0-9]/g, '');
            if (branchCustPart.indexOf(custNameLower) === 0 || custNameLower.indexOf(branchCustPart) === 0) {
              if (selectedSolutions.indexOf(repoKeys[r]) === -1) {
                selectedSolutions.push(repoKeys[r]);
              }
            }
          }
        }
      }
    }
  }

  errorEl.style.display = 'none';
  return {
    name: name,
    email: (document.getElementById('cust-email').value || '').trim(),
    solutions: selectedSolutions,
    status: document.getElementById('cust-status').value,
    notes: (document.getElementById('cust-notes').value || '').trim()
  };
}

function submitCustomerForm(event) {
  event.preventDefault();
  var data = validateCustomerForm();
  if (!data) {
    return;
  }

  var now = new Date().toISOString();
  if (_editingCustomerIndex >= 0) {
    // Edit existing
    var existing = _customersData[_editingCustomerIndex];
    existing.name = data.name;
    existing.email = data.email;
    existing.solutions = data.solutions;
    existing.status = data.status;
    existing.notes = data.notes;
    existing.updatedAt = now;
  } else {
    // Add new
    var newCustomer = {
      id: 'cust_' + Date.now(),
      name: data.name,
      email: data.email,
      solutions: data.solutions,
      status: data.status,
      notes: data.notes,
      createdAt: now,
      updatedAt: now
    };
    _customersData.push(newCustomer);
  }

  // Save to GitHub
  saveCustomers(_customersData, _customersSha).then(function(result) {
    if (result.ok) {
      _customersSha = result.newSha;
      _editingCustomerIndex = -1;
      // Close modal and refresh matrix
      closeCustomerModal();
    } else {
      // On failure: show error, preserve form data
      var errorEl = document.getElementById('customer-form-error');
      errorEl.textContent = 'Save failed: ' + (result.error || 'Unknown error');
      errorEl.style.display = 'block';
      // Revert the change in memory
      if (_editingCustomerIndex < 0) {
        _customersData.pop();
      }
    }
  });
}

function editCustomer(index) {
  if (index < 0 || index >= _customersData.length) {
    return;
  }
  // Open the registration modal for editing
  openCustomerModal('new-customer');

  _editingCustomerIndex = index;
  var c = _customersData[index];

  // Populate form fields (slight delay to ensure modal DOM is ready)
  setTimeout(function() {
    document.getElementById('cust-name').value = c.name || '';
    document.getElementById('cust-email').value = c.email || '';
    document.getElementById('cust-status').value = c.status || 'active';
    document.getElementById('cust-notes').value = c.notes || '';

    // Check solution checkboxes
    var checkboxes = document.querySelectorAll('.cust-solution-cb');
    var solutions = Array.isArray(c.solutions) ? c.solutions : [];
    for (var i = 0; i < checkboxes.length; i++) {
      checkboxes[i].checked = solutions.indexOf(checkboxes[i].value) !== -1;
    }

    // Update button text and modal title
    var btn = document.getElementById('cust-submit-btn');
    if (btn) { btn.textContent = 'Update Customer'; }
    var title = document.getElementById('customer-modal-title');
    if (title) { title.textContent = 'Edit Customer'; }

    // Clear error
    var errorEl = document.getElementById('customer-form-error');
    if (errorEl) { errorEl.style.display = 'none'; }
  }, 50);
}

function deleteCustomer(index) {
  if (index < 0 || index >= _customersData.length) {
    return;
  }
  var removed = _customersData.splice(index, 1)[0];

  saveCustomers(_customersData, _customersSha).then(function(result) {
    if (result.ok) {
      _customersSha = result.newSha;
      // Refresh the registry table in the modal
      var body = document.getElementById('customer-modal-body');
      if (body) {
        body.innerHTML = renderCustomerTable(_customersData);
      }
      // Refresh the matrix
      var matrixArea = document.getElementById('adoption-matrix-area');
      if (matrixArea) {
        matrixArea.innerHTML = renderAdoptionMatrix(_customersData, window._registryData || {}, window._repoMetaData || {});
      }
    } else {
      // Restore customer on failure
      _customersData.splice(index, 0, removed);
      var errorEl = document.getElementById('customer-form-error');
      if (errorEl) {
        errorEl.textContent = 'Delete failed: ' + (result.error || 'Unknown error');
        errorEl.style.display = 'block';
      }
    }
  });
}

function resetCustomerForm() {
  _editingCustomerIndex = -1;

}

function getCellData(customer, repoKey, registry, branchList) {
  if (!customer || !repoKey || !registry || !branchList) {
    return null;
  }
  // Check if customer has adopted this solution
  var solutions = Array.isArray(customer.solutions) ? customer.solutions : [];
  if (solutions.indexOf(repoKey) === -1) {
    return null;
  }

  var repoData = registry[repoKey];
  if (!repoData) {
    return null;
  }

  // Filter branchList for customer-* pattern matching this customer
  var customerName = (customer.name || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  var matchingBranches = [];
  for (var i = 0; i < branchList.length; i++) {
    var branchName = typeof branchList[i] === 'string' ? branchList[i] : (branchList[i].name || '');
    if (branchName.indexOf('customer-') === 0) {
      // Match customer-{customerName} pattern (case-insensitive, alphanumeric)
      var branchCustomerPart = branchName.slice(9).toLowerCase().replace(/[^a-z0-9]/g, '');
      if (branchCustomerPart === customerName || branchName.toLowerCase().indexOf('customer-' + customerName) === 0) {
        matchingBranches.push(branchName);
      }
    }
  }

  if (matchingBranches.length === 0) {
    // No matching customer branch found — check registry teams for this customer
    var teams = repoData.teams || {};
    var teamKeys = Object.keys(teams);
    for (var t = 0; t < teamKeys.length; t++) {
      var team = teams[teamKeys[t]];
      if (team.branch && team.branch.indexOf('customer-') === 0) {
        var teamCustPart = team.branch.slice(9).toLowerCase().replace(/[^a-z0-9]/g, '');
        if (teamCustPart === customerName) {
          // Found in registry teams
          return _determineCellStatus(team, repoData.master_version);
        }
      }
    }
    return null;
  }

  // Use the first matching branch — look up in registry teams
  var matchedBranch = matchingBranches[0];
  var teams2 = repoData.teams || {};
  var teamKeys2 = Object.keys(teams2);
  for (var j = 0; j < teamKeys2.length; j++) {
    var teamData = teams2[teamKeys2[j]];
    if (teamData.branch === matchedBranch) {
      return _determineCellStatus(teamData, repoData.master_version);
    }
  }

  // Branch exists but not in registry — treat as unapproved-drift
  return {
    status: 'unapproved-drift',
    version: matchedBranch,
    branch: matchedBranch,
    lastUpdated: null
  };
}

function _determineCellStatus(teamData, masterVersion) {
  var status = 'behind';
  if (teamData.based_on_master === masterVersion) {
    if (teamData.wants_merge) {
      status = 'wants-merge';
    } else if (teamData.deviation) {
      status = 'approved-deviation';
    } else {
      status = 'master';
    }
  } else {
    // Not on master version
    if (teamData.deviation) {
      status = 'approved-deviation';
    } else if (teamData.wants_merge) {
      status = 'wants-merge';
    } else {
      status = 'behind';
    }
  }

  return {
    status: status,
    version: teamData.local_version || teamData.branch || '\u2014',
    branch: teamData.branch || '\u2014',
    lastUpdated: teamData.last_updated || null
  };
}

function renderAdoptionMatrix(customers, registry, branchData) {
  if (!customers || customers.length === 0) {
    return '<p style="color:var(--muted);font-size:13px;">No customers found. Click "New Customer Registration" to add customers.</p>';
  }
  if (!registry || Object.keys(registry).length === 0) {
    return '<p style="color:var(--muted);font-size:13px;">No solutions found in registry.</p>';
  }

  var repoKeys = Object.keys(registry);
  var html = '<div class="matrix-grid">';
  html += '<table class="matrix-table">';

  // Header row
  html += '<thead><tr>';
  html += '<th>Customer</th>';
  for (var h = 0; h < repoKeys.length; h++) {
    html += '<th>' + repoKeys[h] + '</th>';
  }
  html += '</tr></thead>';

  // Data rows — one per customer
  html += '<tbody>';
  for (var c = 0; c < customers.length; c++) {
    var customer = customers[c];
    html += '<tr>';
    html += '<td>' + (customer.name || '\u2014') + '</td>';

    for (var r = 0; r < repoKeys.length; r++) {
      var repoKey = repoKeys[r];
      var branches = branchData && branchData[repoKey] && branchData[repoKey].branches
        ? branchData[repoKey].branches
        : [];
      var usageInfo = _checkSolutionInUse(customer, repoKey, branches);

      if (usageInfo.inUse) {
        var tooltip = 'In Use \u2014 Branch "' + usageInfo.branch + '" found in ' + repoKey + ' matching customer "' + customer.name + '".';
        html += '<td><span class="matrix-cell status-in-use" title="' + tooltip + '">';
        html += '<span>\u2713 In Use</span>';
        html += '</span></td>';
      } else {
        var notUsedTooltip = 'Not In Use \u2014 No branch containing "' + (customer.name || '') + '" found in ' + repoKey + '.';
        html += '<td><span class="matrix-cell status-not-in-use" title="' + notUsedTooltip + '">';
        html += '<span>\u2717 Not In Use</span>';
        html += '</span></td>';
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  // Legend
  html += '<div class="matrix-legend">';
  html += '<div class="legend-item"><span class="legend-dot" style="background:var(--master);"></span> In Use (branch found)</div>';
  html += '<div class="legend-item"><span class="legend-dot" style="background:var(--muted);"></span> Not In Use (no matching branch)</div>';
  html += '</div>';

  return html;
}

function _checkSolutionInUse(customer, repoKey, branchList) {
  // Check if any branch in this repo contains the customer name (case-insensitive)
  if (!customer || !customer.name || !branchList || branchList.length === 0) {
    return { inUse: false, branch: null };
  }
  var custNameLower = customer.name.toLowerCase().replace(/\s+/g, '');
  for (var i = 0; i < branchList.length; i++) {
    var branchName = typeof branchList[i] === 'string' ? branchList[i] : (branchList[i].name || '');
    var branchLower = branchName.toLowerCase().replace(/\s+/g, '');
    if (branchLower.indexOf(custNameLower) !== -1) {
      return { inUse: true, branch: branchName };
    }
  }
  return { inUse: false, branch: null };
}

function _escAttr(str) {
  if (!str) { return ''; }
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function _escHtml(str) {
  if (!str) { return ''; }
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function exportSettings() {
  var settings = getSettings();
  var blob = new Blob([JSON.stringify(settings, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'dbops-governance-settings.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  var msg = document.getElementById('settings-backup-msg');
  if (msg) { msg.textContent = 'Settings exported successfully.'; msg.style.color = 'var(--master)'; }
}

function importSettings() {
  var fileInput = document.getElementById('settings-import-file');
  if (fileInput) { fileInput.click(); }
}

function handleSettingsImport(event) {
  var file = event.target.files[0];
  if (!file) { return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      saveSettings(imported);
      var msg = document.getElementById('settings-backup-msg');
      if (msg) { msg.textContent = 'Settings imported successfully. Reloading...'; msg.style.color = 'var(--master)'; }
      setTimeout(function() { location.reload(); }, 1000);
    } catch (err) {
      var msg = document.getElementById('settings-backup-msg');
      if (msg) { msg.textContent = 'Invalid settings file: ' + err.message; msg.style.color = 'var(--red)'; }
    }
  };
  reader.readAsText(file);
}

function restoreSettingsFromRepo() {
  var msg = document.getElementById('settings-backup-msg');
  if (msg) { msg.textContent = 'Restoring from GitHub...'; msg.style.color = 'var(--muted)'; }

  // Need at least a PAT to fetch from repo — check localStorage first
  var currentSettings = getSettings();
  if (!currentSettings.github.pat) {
    if (msg) { msg.textContent = 'Enter your GitHub PAT first, then restore.'; msg.style.color = 'var(--red)'; }
    return;
  }

  _loadSettingsFromRepo().then(function(restored) {
    if (restored) {
      if (msg) { msg.textContent = 'Settings restored from GitHub. Reloading...'; msg.style.color = 'var(--master)'; }
      setTimeout(function() { location.reload(); }, 1000);
    } else {
      if (msg) { msg.textContent = 'No backup found in GitHub repo.'; msg.style.color = 'var(--amber)'; }
    }
  });
}

  var isExpanded = titleEl.classList.contains('expanded');

function testJiraConnection() {
  var msgEl = document.getElementById('settings-jira-msg');
  if (msgEl) {
    msgEl.textContent = 'Testing connection...';
    msgEl.style.color = 'var(--muted)';
  }
  var settings = getSettings();
  if (!settings.jira.email || !settings.jira.apiToken) {
    if (msgEl) {
      msgEl.textContent = 'Please enter email and API token first.';
      msgEl.style.color = 'var(--red)';
    }
    return;
  }
  var baseUrl = settings.jira.baseUrl || 'https://corpinfollc.atlassian.net';
  var url = baseUrl + '/rest/api/3/myself';

  safeJiraFetch(url).then(function(result) {
    if (!result.ok) {
      if (msgEl) {
        msgEl.textContent = 'Connection failed: ' + result.error;
        msgEl.style.color = 'var(--red)';
      }
      return { ok: false, displayName: null, error: result.error };
    }
    var displayName = (result.data && result.data.displayName) ? result.data.displayName : 'Unknown';
    if (msgEl) {
      msgEl.textContent = 'Connected as ' + displayName;
      msgEl.style.color = 'var(--master)';
    }
    return { ok: true, displayName: displayName, error: null };
  });
}

function toggleRepoEnabled(el, index) {
  var settings = getSettings();
  if (settings.repos.length === 0) {
    var registry = window._registryData || {};
    var repoKeys = Object.keys(registry);
    settings.repos = repoKeys.map(function(k) { return { name: k, enabled: true }; });
  }
  if (index >= 0 && index < settings.repos.length) {
    settings.repos[index].enabled = !settings.repos[index].enabled;
    el.classList.toggle('active');
    saveSettings(settings);
    window._appSettings = settings;
  }
}

function discoverRepos() {
  var settings = getSettings();
  var org = settings.github.org || 'sachin-dehran';
  var pat = settings.github.pat;

  if (!pat) {
    alert('Please configure your GitHub PAT first.');
    return;
  }

  // Show modal with loading state
  var html = '<div class="modal-overlay" id="discover-repos-overlay" onclick="closeDiscoverRepos(event)" style="display:flex;">';
  html += '<div class="modal-content" onclick="event.stopPropagation()" style="max-width:550px;">';
  html += '<div class="modal-header">';
  html += '<span style="font-size:15px;font-weight:700;color:#fff;">Discover Repositories</span>';
  html += '<button class="chatbot-close" onclick="closeDiscoverRepos()">&times;</button>';
  html += '</div>';
  html += '<div id="discover-repos-body"><p style="color:var(--muted);font-size:12px;">Loading repositories from ' + org + '...</p></div>';
  html += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);

  // Fetch all repos from the org/user (including private)
  var url = GITHUB_API_BASE + '/user/repos?per_page=100&sort=updated&affiliation=owner,collaborator,organization_member';
  safeGitHubFetch(url).then(function(result) {
    var body = document.getElementById('discover-repos-body');
    if (!body) { return; }

    if (!result.ok) {
      body.innerHTML = '<p style="color:var(--red);font-size:12px;">Failed to fetch repos: ' + (result.error || 'Unknown error') + '</p>';
      return;
    }

    var allRepos = result.data || [];
    var currentRepoNames = settings.repos.map(function(r) { return r.name; });

    var listHtml = '<p style="font-size:11px;color:var(--muted);margin-bottom:12px;">Found ' + allRepos.length + ' repositories. Toggle to enable/disable monitoring.</p>';
    listHtml += '<div>';

    for (var i = 0; i < allRepos.length; i++) {
      var repo = allRepos[i];
      var repoName = repo.name;
      var isMonitored = currentRepoNames.indexOf(repoName) !== -1;
      var isEnabled = false;
      if (isMonitored) {
        for (var j = 0; j < settings.repos.length; j++) {
          if (settings.repos[j].name === repoName) {
            isEnabled = settings.repos[j].enabled !== false;
            break;
          }
        }
      }

      listHtml += '<div class="repo-list-item">';
      listHtml += '<div style="display:flex;flex-direction:column;">';
      listHtml += '<span style="font-family:DM Mono,monospace;font-size:12px;color:var(--fg);">' + repoName + '</span>';
      listHtml += '<span style="font-size:10px;color:var(--muted);">' + (repo.description || 'No description') + '</span>';
      listHtml += '</div>';
      listHtml += '<div class="toggle-switch' + (isEnabled ? ' active' : '') + '" onclick="toggleDiscoveredRepo(this, \'' + repoName + '\')"></div>';
      listHtml += '</div>';
    }

    listHtml += '</div>';
    body.innerHTML = listHtml;
  });
}

function toggleDiscoveredRepo(el, repoName) {
  var settings = getSettings();
  var found = false;
  for (var i = 0; i < settings.repos.length; i++) {
    if (settings.repos[i].name === repoName) {
      settings.repos[i].enabled = !settings.repos[i].enabled;
      found = true;
      break;
    }
  }
  if (!found) {
    // Add new repo to monitored list
    settings.repos.push({ name: repoName, enabled: true });
  }
  el.classList.toggle('active');
  saveSettings(settings);
  window._appSettings = settings;
}

function closeDiscoverRepos(event) {
  if (event && event.target && !event.target.classList.contains('modal-overlay')) { return; }
  var overlay = document.getElementById('discover-repos-overlay');
  if (overlay) { overlay.remove(); }
  // Re-render settings page to reflect changes
  renderSettingsPage();
}

function toggleTheme(el) {
  var settings = getSettings();
  if (settings.prefs.theme === 'dark') {
    settings.prefs.theme = 'light';
    el.classList.add('active');
  } else {
    settings.prefs.theme = 'dark';
    el.classList.remove('active');
  }
  saveSettings(settings);
  window._appSettings = settings;
}

function testGitHubConnection() {
  var msgEl = document.getElementById('settings-connection-msg');
  if (msgEl) {
    msgEl.textContent = 'Testing...';
    msgEl.style.color = 'var(--muted)';
  }

  // Save current PAT first so the fetch uses it
  autoSaveSettings();

  var settings = getSettings();
  if (!settings.github.pat) {
    if (msgEl) {
      msgEl.textContent = 'No PAT configured';
      msgEl.style.color = 'var(--red)';
    }
    updateConnectionStatus(false);
    return;
  }

  safeGitHubFetch(GITHUB_API_BASE + '/user').then(function(result) {
    if (result.ok) {
      if (msgEl) {
        var login = result.data && result.data.login ? result.data.login : 'authenticated';
        msgEl.textContent = 'Connected as ' + login;
        msgEl.style.color = 'var(--master)';
      }
      updateConnectionStatus(true);
    } else {
      if (msgEl) {
        msgEl.textContent = result.error || 'Connection failed';
        msgEl.style.color = 'var(--red)';
      }
      updateConnectionStatus(false);
    }
  });
}

function testAIConnection() {
  var msgEl = document.getElementById('settings-ai-msg');
  if (msgEl) {
    msgEl.textContent = 'Testing AI connection...';
    msgEl.style.color = 'var(--muted)';
  }

  // Save current settings first
  autoSaveSettings();

  var settings = getSettings();
  var endpoint = settings.azure.endpoint;
  var apiKey = settings.azure.apiKey;
  var deployment = settings.azure.deployment;

  if (!endpoint || !apiKey || !deployment) {
    if (msgEl) {
      msgEl.textContent = 'Please fill in all Azure OpenAI fields (endpoint, API key, deployment)';
      msgEl.style.color = 'var(--red)';
    }
    return;
  }

  var url = endpoint + '/openai/deployments/' + deployment + '/chat/completions?api-version=2024-02-15-preview';
  var body = {
    messages: [
      { role: 'system', content: 'You are a test assistant. Reply with exactly: CONNECTION_OK' },
      { role: 'user', content: 'Test' }
    ],
    max_tokens: 10,
    temperature: 0
  };

  var controller = new AbortController();
  var timeoutId = setTimeout(function() { controller.abort(); }, 15000);

  fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'api-key': apiKey
    },
    body: JSON.stringify(body),
    signal: controller.signal
  }).then(function(response) {
    clearTimeout(timeoutId);
    if (response.ok) {
      return response.json().then(function(data) {
        if (msgEl) {
          var model = data.model || deployment;
          msgEl.textContent = 'AI Connected \u2014 Model: ' + model;
          msgEl.style.color = 'var(--master)';
        }
      });
    } else {
      return response.json().then(function(errBody) {
        if (msgEl) {
          msgEl.textContent = 'Failed: ' + (errBody.error && errBody.error.message ? errBody.error.message : 'HTTP ' + response.status);
          msgEl.style.color = 'var(--red)';
        }
      }).catch(function() {
        if (msgEl) {
          msgEl.textContent = 'Failed: HTTP ' + response.status;
          msgEl.style.color = 'var(--red)';
        }
      });
    }
  }).catch(function(err) {
    clearTimeout(timeoutId);
    if (msgEl) {
      if (err.name === 'AbortError') {
        msgEl.textContent = 'Timed out (15s)';
      } else {
        msgEl.textContent = 'Error: ' + (err.message || 'Network error');
      }
      msgEl.style.color = 'var(--red)';
    }
  });
}

function updateConnectionStatus(isConnected) {
  var dot = document.getElementById('connection-dot');
  if (!dot) { return; }
  if (isConnected) {
    dot.classList.add('connected');
    dot.title = 'Connected to GitHub API';
  } else {
    dot.classList.remove('connected');
    dot.title = 'Not connected to GitHub API';
  }
}

function updateAlertBadge(count) {
  var badge = document.getElementById('alert-badge');
  if (!badge) { return; }
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

// ── Settings Auto-Save ────────────────────────────────────────────────────────

function autoSaveSettings() {
  var pat = document.getElementById('settings-pat');
  var org = document.getElementById('settings-org');
  var azureEndpoint = document.getElementById('settings-azure-endpoint');
  var azureKey = document.getElementById('settings-azure-key');
  var azureDeployment = document.getElementById('settings-azure-deployment');
  var refreshInterval = document.getElementById('settings-refresh-interval');

  var jiraBaseUrl = document.getElementById('settings-jira-base-url');
  var jiraEmail = document.getElementById('settings-jira-email');
  var jiraApiToken = document.getElementById('settings-jira-api-token');

  var emailSmtp = document.getElementById('settings-email-smtp');
  var emailPort = document.getElementById('settings-email-port');
  var emailSender = document.getElementById('settings-email-sender');
  var emailPassword = document.getElementById('settings-email-password');
  var emailEnabledToggle = document.getElementById('settings-email-enabled-toggle');

  var settings = getSettings();

  if (pat) { settings.github.pat = pat.value.trim(); }
  if (org) { settings.github.org = org.value.trim(); }
  if (azureEndpoint) { settings.azure.endpoint = azureEndpoint.value.trim(); }
  if (azureKey) { settings.azure.apiKey = azureKey.value.trim(); }
  if (azureDeployment) { settings.azure.deployment = azureDeployment.value.trim(); }
  if (refreshInterval) {
    var val = parseInt(refreshInterval.value, 10);
    if (!isNaN(val) && val >= 30 && val <= 3600) {
      settings.prefs.refreshInterval = val;
    }
  }

  if (jiraBaseUrl) { settings.jira.baseUrl = jiraBaseUrl.value.trim() || 'https://corpinfollc.atlassian.net'; }
  if (jiraEmail) { settings.jira.email = jiraEmail.value.trim(); }
  if (jiraApiToken) { settings.jira.apiToken = jiraApiToken.value.trim(); }

  if (emailSmtp) { settings.email.smtp = emailSmtp.value.trim(); }
  if (emailPort) {
    var portVal = parseInt(emailPort.value, 10);
    if (!isNaN(portVal) && portVal > 0 && portVal <= 65535) {
      settings.email.port = portVal;
    }
  }
  if (emailSender) { settings.email.sender = emailSender.value.trim(); }
  if (emailPassword) { settings.email.password = emailPassword.value.trim(); }
  if (emailEnabledToggle) { settings.email.enabled = emailEnabledToggle.classList.contains('active'); }

  var result = saveSettings(settings);
  if (!result.ok) {
    var msgEl = document.getElementById('settings-connection-msg');
    if (msgEl) {
      msgEl.textContent = result.error || 'Save failed';
      msgEl.style.color = 'var(--red)';
    }
  }
}

function populateSettingsFromStorage() {
  var settings = getSettings();

  var pat = document.getElementById('settings-pat');
  var org = document.getElementById('settings-org');
  var azureEndpoint = document.getElementById('settings-azure-endpoint');
  var azureKey = document.getElementById('settings-azure-key');
  var azureDeployment = document.getElementById('settings-azure-deployment');
  var refreshInterval = document.getElementById('settings-refresh-interval');

  if (pat) { pat.value = settings.github.pat || ''; }
  if (org) { org.value = settings.github.org || ''; }
  if (azureEndpoint) { azureEndpoint.value = settings.azure.endpoint || ''; }
  if (azureKey) { azureKey.value = settings.azure.apiKey || ''; }
  if (azureDeployment) { azureDeployment.value = settings.azure.deployment || ''; }
  if (refreshInterval) { refreshInterval.value = settings.prefs.refreshInterval || 300; }
}

function showWelcomeState() {
  var settings = getSettings();
  if (!settings.github.pat) {
    var repoPage = document.getElementById('page-repo-inventory');
    if (repoPage && !repoPage.querySelector('.welcome-state')) {
      var welcomeHtml = '<div class="welcome-state" style="text-align:center;padding:60px 20px;">';
      welcomeHtml += '<div style="font-size:48px;margin-bottom:16px;">&#128075;</div>';
      welcomeHtml += '<h2 style="font-size:20px;font-weight:700;color:#fff;margin-bottom:10px;">Welcome to DBOps Governance</h2>';
      welcomeHtml += '<p style="color:var(--muted);font-size:13px;max-width:400px;margin:0 auto 20px;">Configure your GitHub Personal Access Token in Settings to get started.</p>';
      welcomeHtml += '<button class="btn-primary" onclick="showPage(\'settings\', document.getElementById(\'tab-settings\'))">Go to Settings</button>';
      welcomeHtml += '</div>';
      repoPage.innerHTML = welcomeHtml;
    }
    return true;
  }
  return false;
}

// ── Initialization ────────────────────────────────────────────────────────────

function initDashboard() {
  // Load settings from localStorage
  var settings = loadSettings();

  // Render settings page (always available)
  renderSettingsPage();
  populateSettingsFromStorage();

  // If no PAT configured, show welcome state and stop
  if (!settings.github.pat) {
    showWelcomeState();
    updateConnectionStatus(false);
    return;
  }

  // Show skeleton loaders while fetching
  var repoPage = document.getElementById('page-repo-inventory');
  if (repoPage) {
    repoPage.innerHTML = renderSkeletonCards(4);
  }

  // Fetch registry, customers, and metadata in parallel
  var registryPromise = fetchRegistry();
  var customersPromise = fetchCustomers();

  Promise.all([registryPromise, customersPromise]).then(function(results) {
    var registryResult = results[0];
    var customersResult = results[1];

    // Store registry data globally
    var registry = {};
    if (registryResult.ok && registryResult.data) {
      registry = registryResult.data;
    }
    window._registryData = registry;

    // Store customers data globally
    _customersData = customersResult.customers || [];
    _customersSha = customersResult.sha || null;

    // Update connection status (if registry fetch succeeded, we're connected)
    updateConnectionStatus(registryResult.ok);

    // Sync repos list in settings if empty
    var currentSettings = getSettings();
    if (currentSettings.repos.length === 0) {
      var repoKeys = Object.keys(registry);
      currentSettings.repos = repoKeys.map(function(k) { return { name: k, enabled: true }; });
      saveSettings(currentSettings);
    }

    // Fetch metadata for all repos in parallel
    var repoKeys = Object.keys(registry);
    var enabledRepos = [];
    var settingsRepos = currentSettings.repos || [];
    for (var i = 0; i < repoKeys.length; i++) {
      var repoEntry = null;
      for (var j = 0; j < settingsRepos.length; j++) {
        if (settingsRepos[j].name === repoKeys[i]) {
          repoEntry = settingsRepos[j];
          break;
        }
      }
      if (!repoEntry || repoEntry.enabled !== false) {
        enabledRepos.push(repoKeys[i]);
      }
    }

    var metaPromises = enabledRepos.map(function(repoName) {
      return fetchRepoMetadata(repoName).then(function(meta) {
        return { name: repoName, meta: meta };
      });
    });

    return Promise.all(metaPromises).then(function(metaResults) {
      var repoMeta = {};
      for (var m = 0; m < metaResults.length; m++) {
        repoMeta[metaResults[m].name] = metaResults[m].meta;
      }
      window._repoMetaData = repoMeta;

      // Render repo inventory page
      if (repoPage) {
        repoPage.innerHTML = renderRepoCards(registry, repoMeta);
      }

      // Render customer adoption page
      renderCustomerRegistryPage();

      // Load proposals and render proposals page
      fetchProposals().then(function(proposalsResult) {
        _proposalsData = proposalsResult.proposals || [];
        _proposalsSha = proposalsResult.sha || null;
        renderProposalsPage();
      });

      // Re-render settings page with repo list
      renderSettingsPage();
      populateSettingsFromStorage();

      // Calculate alert badge count (open PRs + issues across all repos)
      var alertCount = 0;
      for (var r = 0; r < enabledRepos.length; r++) {
        var rMeta = repoMeta[enabledRepos[r]];
        if (rMeta) {
          if (Array.isArray(rMeta.prs)) { alertCount += rMeta.prs.length; }
          if (Array.isArray(rMeta.issues)) { alertCount += rMeta.issues.length; }
        }
      }
      updateAlertBadge(alertCount);

      // Phase 2: Check version changes and auto-create JIRA tickets (non-blocking)
      checkVersionChanges(registry);

      // Phase 2: Render Framework page (static content)
      renderFrameworkPage();

      // Detect AI purpose for each repo (non-blocking)
      for (var p = 0; p < enabledRepos.length; p++) {
        (function(repoName) {
          var rMeta = repoMeta[repoName];
          var readmeContent = '';
          if (rMeta && rMeta.readme && rMeta.readme.content) {
            try {
              readmeContent = atob(rMeta.readme.content.replace(/\n/g, ''));
            } catch (e) {
              readmeContent = '';
            }
          }
          detectRepoPurpose(repoName, readmeContent).then(function(purpose) {
            // Update the card with the detected purpose
            var purposeEl = document.getElementById('purpose-' + repoName);
            if (purposeEl) {
              purposeEl.textContent = purpose;
            }
          });
        })(enabledRepos[p]);
      }
    });
  }).catch(function(err) {
    // On catastrophic failure, show error state
    if (repoPage) {
      repoPage.innerHTML = '<p style="color:var(--red);font-size:13px;">Failed to load dashboard data: ' + (err.message || 'Unknown error') + '</p>';
    }
    updateConnectionStatus(false);
  });
}

// ── Nav Clock ─────────────────────────────────────────────────────────────────
function _updateNavClock() {
  var el = document.getElementById('nav-datetime');
  if (!el) { return; }
  var now = new Date();
  var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var day = days[now.getDay()];
  var date = now.getDate();
  var month = months[now.getMonth()];
  var year = now.getFullYear();
  var h = now.getHours();
  var m = now.getMinutes();
  var s = now.getSeconds();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  var timeStr = day + ', ' + date + ' ' + month + ' ' + year + ' ' + h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s + ' ' + ampm;
  el.textContent = timeStr;
}

// ── Event Wiring ──────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', function() {
  // Initialize the dashboard
  initDashboard();

  // Start clock
  _updateNavClock();
  setInterval(_updateNavClock, 1000);

  // Tab button clicks are wired via inline onclick in HTML (showPage)
  // Chatbot toggle is wired via inline onclick in HTML (toggleChatbot)
  // Chatbot input Enter key is wired via inline onkeydown in HTML

  // Settings form auto-save: listen for changes on settings inputs
  document.addEventListener('change', function(e) {
    var target = e.target;
    if (target && target.id && target.id.indexOf('settings-') === 0) {
      autoSaveSettings();
    }
  });

  document.addEventListener('input', function(e) {
    var target = e.target;
    if (target && target.id && target.id.indexOf('settings-') === 0) {
      // Debounce auto-save on input for text fields
      if (window._settingsDebounce) {
        clearTimeout(window._settingsDebounce);
      }
      window._settingsDebounce = setTimeout(function() {
        autoSaveSettings();
      }, 500);
    }
  });

  // Customer form submission via event delegation
  document.addEventListener('submit', function(e) {
    var form = e.target;
    if (form && form.id === 'customer-form') {
      e.preventDefault();
      if (typeof submitCustomerForm === 'function') {
        submitCustomerForm();
      }
    }
  });

  // Close info popups when clicking outside
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.info-btn') && !e.target.closest('.info-popup')) {
      var popups = document.querySelectorAll('.info-popup');
      for (var i = 0; i < popups.length; i++) {
        popups[i].remove();
      }
    }
  });
});
</script>
